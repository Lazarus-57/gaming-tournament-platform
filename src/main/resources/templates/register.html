<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gaming Tournament Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <i class="bi bi-controller"></i>
                <h2>GameArena</h2>
            </div>
            
            <h2>Join the Arena!</h2>
            <p class="subtitle">Create your account and start competing</p>

            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">
                        <i class="bi bi-person me-1"></i> Full Name
                    </label>
                    <input type="text" class="form-control" id="name" name="name"
                           placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope me-1"></i> Email Address
                    </label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="player@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i> Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="••••••••" required minlength="6">
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">
                        <i class="bi bi-shield me-1"></i> Select Your Role
                    </label>
                    <select class="form-select" id="role" name="role" required onchange="toggleExtra()">
                        <option value="">Choose your path...</option>
                        <option value="PLAYER">🎮 Player - Compete in tournaments</option>
                        <option value="ORGANIZER">🏆 Organizer - Host tournaments</option>
                    </select>
                </div>
                <div class="mb-3" id="extraField" style="display: none;">
                    <label for="extra" class="form-label" id="extraLabel">
                        <i class="bi bi-tag me-1"></i> Extra Info
                    </label>
                    <input type="text" class="form-control" id="extra" name="extra" placeholder="">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-rocket-takeoff me-2"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleExtra() {
            var role = document.getElementById('role').value;
            var extraField = document.getElementById('extraField');
            var extraLabel = document.getElementById('extraLabel');
            var extraInput = document.getElementById('extra');

            if (role === 'PLAYER') {
                extraField.style.display = 'block';
                extraLabel.innerHTML = '<i class="bi bi-joystick me-1"></i> Gamer Tag';
                extraInput.placeholder = 'e.g., ProGamer123';
                extraInput.required = true;
            } else if (role === 'ORGANIZER') {
                extraField.style.display = 'block';
                extraLabel.innerHTML = '<i class="bi bi-building me-1"></i> Organization Name';
                extraInput.placeholder = 'e.g., Epic Esports';
                extraInput.required = true;
            } else {
                extraField.style.display = 'none';
                extraInput.required = false;
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
