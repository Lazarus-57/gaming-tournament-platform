<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Disputes')}"></head>
<body class="dashboard-page">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container mt-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-white mb-0"><i class="bi bi-exclamation-triangle-fill"></i> My Disputes</h3>
            <a th:href="@{/player/dashboard}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card glass-card">
            <div class="card-header">
                <h5 class="mb-0">Raised Disputes</h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(disputes)}" class="empty-state">
                    <h4>No Disputes Yet</h4>
                    <p>Raise disputes from tournament match result cards when needed.</p>
                </div>
                <div class="table-responsive" th:unless="${#lists.isEmpty(disputes)}">
                    <table class="table table-modern mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Match</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Raised</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d : ${disputes}">
                                <td th:text="${d.disputeId}">1</td>
                                <td th:text="${d.match != null ? d.match.matchId : 'N/A'}">1</td>
                                <td th:text="${d.reason}">Reason</td>
                                <td>
                                    <span class="status-badge" th:classappend="${'status-' + d.status.name().toLowerCase()}"
                                          th:text="${d.status}">RAISED</span>
                                </td>
                                <td th:text="${#temporals.format(d.raisedAt, 'yyyy-MM-dd HH:mm')}">Time</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
