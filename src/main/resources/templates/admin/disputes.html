<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dispute Monitoring')}"></head>
<body class="dashboard-page">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-white mb-0"><i class="bi bi-clipboard2-pulse-fill"></i> Dispute Logs & Monitoring</h3>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary"><i class="bi bi-arrow-left"></i> Back</a>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card-modern">
                    <div class="stat-icon orange"><i class="bi bi-flag-fill"></i></div>
                    <div class="stat-details"><span class="stat-value" th:text="${raisedDisputes}">0</span><span class="stat-label">Raised</span></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card-modern">
                    <div class="stat-icon blue"><i class="bi bi-hourglass-split"></i></div>
                    <div class="stat-details"><span class="stat-value" th:text="${underReviewDisputes}">0</span><span class="stat-label">Under Review</span></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card-modern">
                    <div class="stat-icon green"><i class="bi bi-check2-circle"></i></div>
                    <div class="stat-details"><span class="stat-value" th:text="${closedDisputes}">0</span><span class="stat-label">Closed</span></div>
                </div>
            </div>
        </div>

        <div class="card glass-card">
            <div class="card-header"><h5 class="mb-0">Dispute Audit Trail</h5></div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(disputes)}" class="empty-state"><h4>No disputes logged yet</h4></div>
                <div class="table-responsive" th:unless="${#lists.isEmpty(disputes)}">
                    <table class="table table-modern mb-0">
                        <thead>
                            <tr><th>ID</th><th>Match</th><th>Raised By</th><th>Reviewed By</th><th>Status</th><th>Raised At</th><th>Resolved At</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="d : ${disputes}">
                                <td th:text="${d.disputeId}">1</td>
                                <td th:text="${d.match != null ? d.match.matchId : 'N/A'}">1</td>
                                <td th:text="${d.raisedBy != null ? d.raisedBy.gamerTag : 'N/A'}">Player</td>
                                <td th:text="${d.reviewedBy != null ? d.reviewedBy.name : '-'}">Organizer</td>
                                <td><span class="status-badge" th:classappend="${'status-' + d.status.name().toLowerCase()}" th:text="${d.status}">Status</span></td>
                                <td th:text="${#temporals.format(d.raisedAt, 'yyyy-MM-dd HH:mm')}">-</td>
                                <td th:text="${d.resolvedAt != null ? #temporals.format(d.resolvedAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
