<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Gaming Tournament Platform'">Gaming Tournament Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <!-- Navbar Fragment -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> GameArena
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- Player Navigation -->
                    <li class="nav-item" sec:authorize="hasRole('PLAYER')">
                        <a class="nav-link" th:href="@{/player/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('PLAYER')">
                        <a class="nav-link" th:href="@{/player/tournaments}"><i class="bi bi-trophy-fill"></i> Tournaments</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('PLAYER')">
                        <a class="nav-link" th:href="@{/player/notifications}"><i class="bi bi-bell-fill"></i> Alerts</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('PLAYER')">
                        <a class="nav-link" th:href="@{/player/disputes}"><i class="bi bi-exclamation-triangle-fill"></i> Disputes</a>
                    </li>
                    
                    <!-- Organizer Navigation -->
                    <li class="nav-item" sec:authorize="hasRole('ORGANIZER')">
                        <a class="nav-link" th:href="@{/organizer/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ORGANIZER')">
                        <a class="nav-link" th:href="@{/organizer/tournaments/create}"><i class="bi bi-plus-circle-fill"></i> Create Event</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ORGANIZER')">
                        <a class="nav-link" th:href="@{/organizer/disputes}"><i class="bi bi-shield-exclamation"></i> Review Disputes</a>
                    </li>
                    
                    <!-- Admin Navigation -->
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people-fill"></i> Users</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/tournaments}"><i class="bi bi-trophy-fill"></i> Tournaments</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-graph-up-arrow"></i> Analytics</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/disputes}"><i class="bi bi-clipboard2-pulse-fill"></i> Dispute Logs</a>
                    </li>
                    
                    <!-- Logout -->
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Footer Fragment -->
    <footer th:fragment="footer">
        <div class="container">
            <p class="mb-0">
                <i class="bi bi-controller me-2"></i>
                &copy; 2025-26 Gaming Tournament Management Platform | OOAD Mini Project
                <i class="bi bi-controller ms-2"></i>
            </p>
        </div>
    </footer>

    <script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
